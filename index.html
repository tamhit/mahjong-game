<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0d3b1e">
  <title>麻雀点数計算クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🀄 麻雀点数計算クイズ</h1>
    <span id="score-display">0 / 0</span>
  </header>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <main>
    <div id="quiz-area">
      <p style="text-align:center; padding:40px; color:#a8c4b0;">読み込み中...</p>
    </div>
  </main>

  <!-- 点数早見表モーダル -->
  <div id="score-table-modal" class="modal-overlay" onclick="if(event.target===this)closeScoreTable()">
    <div class="modal-content">
      <div class="modal-header">
        <span>📊 点数早見表</span>
        <button class="modal-close" onclick="closeScoreTable()">✕</button>
      </div>
      <div class="score-tabs">
        <button class="score-tab-btn active" data-tab="koRon" onclick="switchScoreTab('koRon')">子ロン</button>
        <button class="score-tab-btn" data-tab="oyaRon" onclick="switchScoreTab('oyaRon')">親ロン</button>
        <button class="score-tab-btn" data-tab="koTsumo" onclick="switchScoreTab('koTsumo')">子ツモ</button>
        <button class="score-tab-btn" data-tab="oyaTsumo" onclick="switchScoreTab('oyaTsumo')">親ツモ</button>
      </div>
      <div class="score-table-wrapper">
        <div id="score-table-content"></div>
      </div>
    </div>
  </div>

  <script src="problems.js"></script>
  <script src="game.js"></script>
</body>
</html>
